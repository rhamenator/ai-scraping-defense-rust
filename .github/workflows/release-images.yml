name: release-images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ai-scraping-defense-rust

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::12}"
          tags="${IMAGE_NAME}:git-${short_sha}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${ref_name#v}"
            tags="${IMAGE_NAME}:${version},${tags}"
            if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              minor="${version%.*}"
              tags="${IMAGE_NAME}:${minor},${IMAGE_NAME}:latest,${tags}"
            fi
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ai-scraping-defense-rust
            org.opencontainers.image.description=Rust service stack for AI scraping defense
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Summarize image
        shell: bash
        run: |
          {
            echo "Published image tags:"
            IFS=',' read -ra tags <<< "${{ steps.tags.outputs.tags }}"
            for tag in "${tags[@]}"; do
              echo "- \`${tag}\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
